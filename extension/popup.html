<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;margin:0;padding:14px;width:300px;background:#1a1a2e;color:#fff;}
  h1{font-size:14px;font-weight:800;margin-bottom:4px;}
  .sub{font-size:11px;color:rgba(255,255,255,.5);margin-bottom:12px;}
  .stat{background:rgba(255,255,255,.08);border-radius:10px;padding:10px 12px;margin-bottom:10px;}
  .stat .n{font-size:22px;font-weight:900;color:#f5a623;}
  .stat .l{font-size:11px;color:rgba(255,255,255,.6);}
  button{width:100%;background:linear-gradient(135deg,#e94560,#f5a623);color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:6px;font-family:inherit;}
  button:hover{filter:brightness(1.1);}
  button.secondary{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);}
  .list{max-height:160px;overflow-y:auto;font-size:11px;background:rgba(0,0,0,.2);border-radius:8px;padding:6px;margin-bottom:8px;}
  .list .row{padding:4px 6px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;gap:6px;}
  .list .row:last-child{border-bottom:none;}
  .list .row .name{font-weight:700;color:#f5a623;}
  .list .row .date{color:rgba(255,255,255,.5);font-size:10px;}
  .empty{color:rgba(255,255,255,.4);font-style:italic;text-align:center;padding:10px;}
  .footer{font-size:10px;color:rgba(255,255,255,.4);text-align:center;margin-top:8px;}
</style>
</head>
<body>
  <h1>🏨 beautyhotel 房價同步</h1>
  <div class="sub">Google Travel → 比價表</div>

  <div class="stat">
    <div class="n" id="count">0</div>
    <div class="l">已抓取筆數 (hotel × 日期)</div>
  </div>

  <div class="list" id="list">
    <div class="empty">尚未抓取任何資料</div>
  </div>

  <button id="open-bh">→ 開啟 beautyhotel 比價表</button>
  <button id="open-gt">→ 開啟 Google Travel</button>
  <button id="clear" class="secondary">🗑 清空所有已抓資料</button>

  <div class="footer">
    在 Google Travel 飯店頁右下角點「📥 抓房價」收集，再到比價表頁點「📥 從擴充匯入」。
  </div>

<script src="popup.js"></script>
</body>
</html>
